<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact - Harinivas M</title>
  <style>
    :root {
      --slate-50: #f8fafc;
      --slate-100: #f1f5f9;
      --slate-200: #e2e8f0;
      --slate-300: #cbd5e1;
      --slate-400: #94a3b8;
      --slate-500: #64748b;
      --slate-600: #475569;
      --slate-700: #334155;
      --slate-800: #1e293b;
      --slate-900: #0f172a;

      --blue-600: #2563eb;
      --blue-700: #1d4ed8;
      --emerald-500: #10b981;

      --bg: var(--slate-50);
      --bg-elevated: white;
      --text: var(--slate-900);
      --text-muted: var(--slate-600);
      --text-subtle: var(--slate-500);
      --border: var(--slate-200);
      --accent: var(--blue-600);

      --transition-smooth: cubic-bezier(0.16, 1, 0.3, 1);
      --shadow-sm: 0 1px 2px rgba(15, 23, 42, 0.04);
      --shadow-md: 0 4px 6px -1px rgba(15, 23, 42, 0.08), 0 2px 4px -1px rgba(15, 23, 42, 0.04);
      --shadow-lg: 0 10px 15px -3px rgba(15, 23, 42, 0.08), 0 4px 6px -2px rgba(15, 23, 42, 0.04);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', 'Roboto', 'Helvetica Neue', Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      overflow-x: hidden;
      cursor: none;
    }

    #cursor {
      position: fixed;
      width: 12px;
      height: 12px;
      background: var(--accent);
      border-radius: 50%;
      pointer-events: none;
      z-index: 10000;
      transition: transform 0.15s ease;
      mix-blend-mode: difference;
    }

    #cursor-follower {
      position: fixed;
      width: 40px;
      height: 40px;
      border: 1px solid var(--accent);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transition: transform 0.25s ease;
      mix-blend-mode: difference;
    }

    body.cursor-hover #cursor {
      transform: scale(1.5);
    }

    body.cursor-hover #cursor-follower {
      transform: scale(1.5);
    }

    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
      background: rgba(248, 250, 252, 0.95);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      box-shadow: var(--shadow-sm);
    }

    .nav-container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 1.25rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      display: flex;
      align-items: center;
      text-decoration: none;
      transition: transform 0.3s ease;
    }

    .logo:hover {
      transform: scale(1.05);
    }

    .logo-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--border);
      box-shadow: var(--shadow-sm);
      transition: all 0.3s ease;
    }

    .logo:hover .logo-avatar {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    }

    .nav-links {
      display: flex;
      gap: 0.5rem;
      list-style: none;
    }

    .nav-links a {
      padding: 0.5rem 1rem;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.9375rem;
      font-weight: 500;
      transition: all 0.3s ease;
      border-radius: 0.5rem;
    }

    .nav-links a:hover,
    .nav-links a.active {
      color: var(--accent);
      background: rgba(37, 99, 235, 0.06);
    }

    .page-header {
      padding: 8rem 2rem 4rem;
      text-align: center;
      max-width: 800px;
      margin: 0 auto;
    }

    .page-label {
      font-size: 0.875rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--accent);
      margin-bottom: 1rem;
      opacity: 0;
      animation: fadeInUp 0.6s var(--transition-smooth) 0.2s forwards;
    }

    .page-title {
      font-size: clamp(2.5rem, 6vw, 4rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      margin-bottom: 1.5rem;
      opacity: 0;
      animation: fadeInUp 0.6s var(--transition-smooth) 0.3s forwards;
    }

    .page-description {
      font-size: 1.25rem;
      color: var(--text-muted);
      line-height: 1.7;
      opacity: 0;
      animation: fadeInUp 0.6s var(--transition-smooth) 0.4s forwards;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .contact-container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 2rem 6rem;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 3rem;
    }

    .contact-info {
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }

    .contact-card {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: 1rem;
      padding: 2rem;
      box-shadow: var(--shadow-sm);
      transition: all 0.3s var(--transition-smooth);
    }

    .contact-card:hover {
      box-shadow: var(--shadow-lg);
      transform: translateY(-4px);
      border-color: var(--accent);
    }

    .contact-card h3 {
      font-size: 1.25rem;
      font-weight: 700;
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .contact-icon {
      width: 40px;
      height: 40px;
      border-radius: 0.625rem;
      background: linear-gradient(135deg, rgba(37, 99, 235, 0.1), rgba(16, 185, 129, 0.1));
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--accent);
    }

    .contact-method {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1rem;
      background: var(--slate-50);
      border-radius: 0.75rem;
      margin-bottom: 0.75rem;
      transition: all 0.3s ease;
      text-decoration: none;
      color: var(--text);
    }

    .contact-method:hover {
      background: rgba(37, 99, 235, 0.06);
      transform: translateX(4px);
    }

    .method-icon {
      width: 36px;
      height: 36px;
      border-radius: 0.5rem;
      background: var(--bg-elevated);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--accent);
    }

    .method-content {
      flex: 1;
    }

    .method-label {
      font-size: 0.8125rem;
      color: var(--text-subtle);
      margin-bottom: 0.125rem;
    }

    .method-value {
      font-weight: 600;
      color: var(--text);
    }

    .social-links {
      display: flex;
      gap: 1rem;
    }

    .social-link {
      width: 48px;
      height: 48px;
      border-radius: 0.75rem;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      transition: all 0.3s ease;
      text-decoration: none;
    }

    .social-link:hover {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
      transform: translateY(-3px);
    }

    .form-container {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: 1rem;
      padding: 2.5rem;
      box-shadow: var(--shadow-md);
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    .form-group label {
      display: block;
      font-weight: 600;
      margin-bottom: 0.5rem;
      color: var(--text);
    }

    .form-group input,
    .form-group textarea {
      width: 100%;
      padding: 0.875rem 1rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 0.625rem;
      font-size: 0.9375rem;
      font-family: inherit;
      color: var(--text);
      transition: all 0.3s ease;
    }

    .form-group input:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    }

    .form-group textarea {
      resize: vertical;
      min-height: 150px;
    }

    .submit-btn {
      width: 100%;
      padding: 1rem;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 0.625rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s var(--transition-smooth);
    }

    .submit-btn:hover {
      background: var(--blue-700);
      box-shadow: var(--shadow-lg);
      transform: translateY(-2px);
    }

    @media (max-width: 968px) {
      .contact-container {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 768px) {
      .nav-links {
        display: none;
      }

      .page-header {
        padding: 6rem 1.5rem 3rem;
      }

      .contact-container {
        padding: 0 1.5rem 4rem;
      }

      .form-container {
        padding: 2rem;
      }
    }
  </style>
</head>

    <div class="form-container">

        </div>

          <input type="text" id="subject" name="subject" placeholder="Collaboration Opportunity" required>
        </div>

  <script>
    const cursor = document.getElementById('cursor');
    const cursorFollower = document.getElementById('cursor-follower');

    let mouseX = 0, mouseY = 0;
    let followerX = 0, followerY = 0;

    document.addEventListener('mousemove', (e) => {
      mouseX = e.clientX;
      mouseY = e.clientY;
      cursor.style.left = mouseX + 'px';
      cursor.style.top = mouseY + 'px';
    });

    function animateFollower() {
      followerX += (mouseX - followerX) * 0.1;
      followerY += (mouseY - followerY) * 0.1;
      cursorFollower.style.left = (followerX - 20) + 'px';
      cursorFollower.style.top = (followerY - 20) + 'px';
      requestAnimationFrame(animateFollower);
    }
    animateFollower();

    const interactiveElements = document.querySelectorAll('a, button, input, textarea');
    interactiveElements.forEach(el => {
      el.addEventListener('mouseenter', () => document.body.classList.add('cursor-hover'));
      el.addEventListener('mouseleave', () => document.body.classList.remove('cursor-hover'));
    });

    // Form submission
    const form = document.querySelector('form');
    form.addEventListener('submit', (e) => {
      e.preventDefault();
      alert('Thank you for your message! This is a demo form. In production, this would send an email.');
    });
  </script>
